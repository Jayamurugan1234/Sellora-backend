<!DOCTYPE html>
<html>
<head><title>Notifications</title></head>
<body>
    <h1>Your Notifications</h1>

    {% if notifications %}
        <ul>
        {% for n in notifications %}
            <li style="{% if not n.is_read %}font-weight:bold;{% endif %}">
                <strong>{{ n.title }}</strong> — {{ n.message }}
                <br><small>{{ n.created_at }}</small>
                {% if not n.is_read %}
                    <a href="{% url 'notifications:mark_as_read' n.id %}">Mark as read</a>
                {% endif %}
            </li>
            <hr>
        {% endfor %}
        </ul>
    {% else %}
        <p>No notifications yet.</p>
    {% endif %}
</body>
</html>
