<!DOCTYPE html>
<html>
<head><title>My Orders</title></head>
<body>
    <h1>My Orders</h1>
    {% if orders %}
        <ul>
        {% for order in orders %}
            <li>
                <a href="{% url 'orders:order_detail' order.id %}">
                    Order #{{ order.id }} — {{ order.status }} — ₹{{ order.total_amount }}
                </a>
                ({{ order.created_at }})
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>You haven't placed any orders yet.</p>
    {% endif %}
</body>
</html>
